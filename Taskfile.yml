version: "3"
env:
  PGM_NAME: firefly
tasks:
  build:
    cmds:
      - cargo fmt
      - cargo build --release
  run:
    cmds:
      - target/release/$PGM_NAME
  run:firefly:
    cmds:
      - target/release/firefly
  run:followings:
    cmds:
      - target/release/followings
  run:bouncing:
    cmds:
      - target/release/bouncing
  install:
    deps: [build]
    cmds:
      - cp target/release/$PGM_NAME ~/bin

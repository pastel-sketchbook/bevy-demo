[package]
name = "bevy-demo"
version = "0.2.1"
edition = "2024"

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

[dependencies]
bevy = "0.17.2"
rand = "0.9.2"
rand_chacha = "0.9.0"

[[bin]]
name = "firefly"
src = "src/bin/firefly.rs"

[[bin]]
name = "followings"
src = "src/bin/followings.rs"

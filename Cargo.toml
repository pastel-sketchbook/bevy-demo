[package]
name = "bevy-demo"
version = "0.1.0"
edition = "2021"

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

[dependencies]
bevy = "0.15.1"
rand = "0.8.0"
rand_chacha = "0.3.1"

[[bin]]
name = "firefly"
src = "src/bin/firefly.rs"

[[bin]]
name = "followings"
src = "src/bin/followings.rs"

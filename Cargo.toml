[package]
name = "bevy-demo"
version = "0.2.1"
edition = "2024"

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

[dependencies]
bevy = "0.16.0"
rand = "0.8.0"
rand_chacha = "0.3.1"

[[bin]]
name = "firefly"
src = "src/bin/firefly.rs"

[[bin]]
name = "followings"
src = "src/bin/followings.rs"
